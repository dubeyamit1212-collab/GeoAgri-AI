<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GeoAgri AI — Crop Classification Platform</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
<style>
:root {
  --brand-blue: #1a4d8f;
  --brand-blue-dark: #123a6b;
  --cotton: #ffc107;
  --paddy: #2e8b57;
  --other: #9aa5b1;
  --border: #e2e6ea;
  --bg: #f7f8fa;
  --text: #1f2937;
  --muted: #6b7280;
  --radius: 8px;
  --shadow: 0 2px 10px rgba(0, 0, 0, 0.12);
}

* { box-sizing: border-box; }

html, body {
  height: 100%;
  margin: 0;
  font-family: "Segoe UI", Roboto, Arial, sans-serif;
  color: var(--text);
  background: var(--bg);
}

body {
  display: flex;
  flex-direction: column;
}

/* ---------- Top bar ---------- */

.topbar {
  height: 56px;
  flex: 0 0 auto;
  background: linear-gradient(90deg, var(--brand-blue), var(--brand-blue-dark));
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  box-shadow: var(--shadow);
  z-index: 20;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 20px;
  font-weight: 600;
}

.brand-icon { width: 22px; height: 22px; filter: brightness(0) invert(1); }

.tagline { font-size: 13px; opacity: 0.85; }

/* ---------- Body layout ---------- */

.app-body {
  flex: 1 1 auto;
  display: flex;
  min-height: 0;
}

.sidebar {
  width: 300px;
  flex: 0 0 300px;
  background: #fff;
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 14px;
}

.map-wrap {
  position: relative;
  flex: 1 1 auto;
  min-width: 0;
}

#map {
  position: absolute;
  inset: 0;
}

/* ---------- Panels ---------- */

.panel {
  background: #fff;
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 14px;
}

.sidebar .panel {
  border-bottom: 1px solid var(--border);
  border-radius: 0;
  padding: 14px 0;
  margin-bottom: 0;
}
.sidebar .panel + .panel { padding-top: 14px; }

.panel h3 {
  margin: 0 0 10px;
  font-size: 14px;
  font-weight: 700;
  color: var(--brand-blue-dark);
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.floating {
  position: absolute;
  z-index: 1000; /* Leaflet's own panes/controls sit around 400-1000; this must clear them or the panel renders invisibly underneath the map */
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}

.layer-switcher {
  top: 12px;
  right: 12px;
  width: 170px;
  font-size: 13px;
}
.layer-switcher label {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
  cursor: pointer;
}

.pixel-inspector {
  top: 130px;
  right: 12px;
  width: 190px;
}

/* ---------- Layers panel (opacity slider + toggles) ---------- */

input[type="range"] {
  width: 100%;
  accent-color: var(--brand-blue);
}

.opacity-value {
  text-align: right;
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 400;
  color: var(--text);
  margin: 10px 0 0;
  cursor: pointer;
}
.checkbox-row input { accent-color: var(--brand-blue); width: 15px; height: 15px; }

/* ---------- Form controls ---------- */

label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin: 10px 0 4px;
}

select, .primary-btn, .secondary-btn {
  width: 100%;
  padding: 8px 10px;
  font-size: 13px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: #fff;
}

select:disabled { background: #f2f3f5; color: var(--muted); cursor: not-allowed; }

.primary-btn {
  margin-top: 14px;
  background: var(--brand-blue);
  color: #fff;
  border: none;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.primary-btn:hover:not(:disabled) { background: var(--brand-blue-dark); }
.primary-btn:disabled { background: #b9c4d4; cursor: not-allowed; }

.secondary-btn {
  margin-top: 12px;
  background: #fff;
  color: var(--brand-blue-dark);
  border: 1px solid var(--brand-blue);
  font-weight: 600;
  cursor: pointer;
}
.secondary-btn:hover { background: #eef3fb; }

/* ---------- Legend ---------- */

.legend-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  margin-bottom: 6px;
}

.swatch { width: 16px; height: 16px; border-radius: 3px; display: inline-block; }
.swatch.cotton, .dot.cotton { background: var(--cotton); }
.swatch.paddy, .dot.paddy { background: var(--paddy); }
.dot.other { background: var(--other); }

.dot {
  width: 10px; height: 10px; border-radius: 50%; display: inline-block;
}

/* ---------- Key/value rows ---------- */

.kv {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 3px 0;
  color: var(--muted);
}
.kv b { color: var(--text); font-weight: 600; }

/* ---------- Analytics ---------- */

.muted { color: var(--muted); font-size: 13px; }

.stat-title { font-size: 16px; font-weight: 700; margin-top: 6px; }
.stat-sub { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

#stat-chart { display: block; margin: 8px auto; }

.stat-row {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  padding: 3px 0;
}
.stat-row b { margin-left: auto; }

/* ---------- Status bar ---------- */

.statusbar {
  flex: 0 0 auto;
  height: 30px;
  background: #fff;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  font-size: 12px;
  color: var(--muted);
}

#status-text.ok { color: #1b7f3b; }
#status-text.error { color: #c62828; }

/* ---------- Leaflet tweaks ---------- */

.leaflet-popup-content { font-size: 13px; }

</style>
</head>
<body>


<header class="topbar">
  <div class="brand">
    <img src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/images/marker-icon.png" alt="" class="brand-icon" />
    <span>GeoAgri AI</span>
  </div>
  <div class="tagline">Crop Classification Platform</div>
</header>

<div class="app-body">

  <aside class="sidebar">

    <section class="panel">
      <h3>Layers</h3>

      <label for="opacity-slider">Raster Opacity</label>
      <input type="range" id="opacity-slider" min="0" max="100" value="85" />
      <div class="opacity-value"><span id="opacity-value">85%</span></div>

      <label class="checkbox-row">
        <input type="checkbox" id="toggle-crop" checked /> Crop Classification
      </label>
      <label class="checkbox-row">
        <input type="checkbox" id="toggle-boundary" checked /> District / Village Boundary
      </label>
    </section>

    <section class="panel">
      <h3>Legend</h3>
      <div class="legend-row"><span class="swatch cotton"></span> Cotton</div>
      <div class="legend-row"><span class="swatch paddy"></span> Paddy</div>
    </section>

    

    <section class="panel">
      <h3>📍 Location</h3>

      <label for="district-select">District</label>
      <select id="district-select">
        <option value="">Select District</option>
      </select>

      <label for="village-select">Village</label>
      <select id="village-select" disabled>
        <option value="">Select Village</option>
      </select>

      <button id="show-analytics-btn" class="primary-btn" disabled>Show Analytics</button>
    </section>

    <section class="panel" id="analytics-panel" hidden>
      <h3>Village Analytics</h3>
      <div id="analytics-empty" class="muted">Select a village.</div>
      <div id="analytics-content" hidden>
        <div class="stat-title" id="stat-village-name">—</div>
        <div class="stat-sub" id="stat-district-name">—</div>

        <canvas id="stat-chart" width="220" height="220"></canvas>

        <div class="stat-row"><span class="dot cotton"></span> Cotton <b id="stat-cotton">—</b></div>
        <div class="stat-row"><span class="dot paddy"></span> Paddy <b id="stat-paddy">—</b></div>
        <div class="stat-row"><span class="dot other"></span> Other / NoData <b id="stat-other">—</b></div>

        <div class="kv"><span>Total Area</span><b id="stat-total">—</b></div>

        <button id="export-stats-btn" class="secondary-btn">Export GeoJSON</button>
      </div>
    </section>

  </aside>

  <main class="map-wrap">
    <div id="map"></div>

    <div class="layer-switcher panel floating">
      <label><input type="radio" name="basemap" value="osm" checked /> OpenStreetMap</label>
      <label><input type="radio" name="basemap" value="satellite" /> Satellite</label>
    </div>

    <div class="pixel-inspector panel floating">
      <h3>Pixel Inspector</h3>
      <div class="kv"><span>Latitude</span><b id="px-lat">—</b></div>
      <div class="kv"><span>Longitude</span><b id="px-lon">—</b></div>
      <div class="kv"><span>Pixel Value</span><b id="px-val">—</b></div>
      <div class="kv"><span>Crop</span><b id="px-crop">—</b></div>
    </div>
  </main>

</div>

<footer class="statusbar">
  <span id="status-text">✓ Ready</span>
  <span class="statusbar-right">Agricultural Intelligence Platform</span>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script>
/* ==========================================================
   GeoAgri AI — Dashboard logic
   ========================================================== */

const statusEl = document.getElementById("status-text");

function setStatus(text, kind) {
  statusEl.textContent = text;
  statusEl.className = kind || "";
}

async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) {
    const body = await res.json().catch(() => ({}));
    throw new Error(body.detail || `Request failed (${res.status})`);
  }
  return res.json();
}

/* ---------- Map setup ---------- */

const map = L.map("map", { zoomControl: true }).setView([29.3, 75.3], 9);

const osmLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors",
  maxZoom: 19,
});

const satelliteLayer = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { attribution: "Tiles &copy; Esri", maxZoom: 19 }
);

osmLayer.addTo(map);

let cropLayer = null;
let boundaryLayer = null;
const drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

/* Basemap switcher */
document.querySelectorAll('input[name="basemap"]').forEach((el) => {
  el.addEventListener("change", (e) => {
    if (e.target.value === "osm") {
      map.removeLayer(satelliteLayer);
      osmLayer.addTo(map);
    } else {
      map.removeLayer(osmLayer);
      satelliteLayer.addTo(map);
    }
    if (cropLayer) cropLayer.bringToFront();
  });
});

/* Raster opacity slider */
const opacitySlider = document.getElementById("opacity-slider");
const opacityValue = document.getElementById("opacity-value");
opacitySlider.addEventListener("input", () => {
  const pct = Number(opacitySlider.value);
  opacityValue.textContent = `${pct}%`;
  if (cropLayer) cropLayer.setOpacity(pct / 100);
});

/* Layer visibility toggles */
document.getElementById("toggle-crop").addEventListener("change", (e) => {
  if (!cropLayer) return;
  if (e.target.checked) {
    cropLayer.addTo(map);
  } else {
    map.removeLayer(cropLayer);
  }
});

document.getElementById("toggle-boundary").addEventListener("change", (e) => {
  if (!boundaryLayer) return;
  if (e.target.checked) {
    boundaryLayer.addTo(map);
  } else {
    map.removeLayer(boundaryLayer);
  }
});

/* Draw tools (measure / annotate) */
const drawControl = new L.Control.Draw({
  edit: { featureGroup: drawnItems },
  draw: {
    polygon: { showArea: true },
    marker: true,
    rectangle: true,
    polyline: true,
    circle: false,
    circlemarker: false,
  },
});
map.addControl(drawControl);

map.on(L.Draw.Event.CREATED, (e) => {
  drawnItems.addLayer(e.layer);
  if (e.layerType === "polygon" || e.layerType === "rectangle") {
    const areaM2 = L.GeometryUtil ? L.GeometryUtil.geodesicArea(e.layer.getLatLngs()[0]) : null;
    if (areaM2) {
      const ha = (areaM2 / 10000).toFixed(2);
      e.layer.bindPopup(`Area: ${ha} ha`).openPopup();
    }
  }
});

/* Home button: reset view */
const HomeControl = L.Control.extend({
  options: { position: "topleft" },
  onAdd: function () {
    const btn = L.DomUtil.create("button", "leaflet-bar home-btn");
    btn.innerHTML = "🏠";
    btn.title = "Reset view";
    btn.onclick = () => {
      if (window.__rasterBounds) {
        map.fitBounds(window.__rasterBounds);
      } else {
        map.setView([29.3, 75.3], 9);
      }
    };
    return btn;
  },
});
map.addControl(new HomeControl());

/* ---------- Raster info + crop tile layer ---------- */

async function loadRasterInfo() {
  try {
    const info = await fetchJSON("/info");
    //document.getElementById("info-width").textContent = info.width;
    //document.getElementById("info-height").textContent = info.height;
    //document.getElementById("info-bands").textContent = info.bands;
    //document.getElementById("info-minzoom").textContent = info.min_zoom;
    //document.getElementById("info-maxzoom").textContent = info.max_zoom;

    const b = info.bounds_wgs84; // [left, bottom, right, top]
    const bounds = L.latLngBounds([b[1], b[0]], [b[3], b[2]]);
    window.__rasterBounds = bounds;

    cropLayer = L.tileLayer("/tiles/{z}/{x}/{y}.png", {
      minZoom: info.min_zoom,
      maxZoom: info.max_zoom,
      maxNativeZoom: info.max_zoom,
      bounds: bounds,
      tileSize: info.tile_size,
      opacity: 0.85,
    }).addTo(map);

    map.fitBounds(bounds);
    setStatus("✓ Ready", "ok");
  } catch (err) {
    console.error(err);
    setStatus("⚠ Raster unavailable — " + err.message, "error");
  }
}

/* ---------- District / Village dropdowns ---------- */

const districtSelect = document.getElementById("district-select");
const villageSelect = document.getElementById("village-select");
const showAnalyticsBtn = document.getElementById("show-analytics-btn");

async function loadDistricts() {
  try {
    const data = await fetchJSON("/districts");
    districtSelect.innerHTML = '<option value="">Select District</option>';
    data.districts.forEach((d) => {
      const opt = document.createElement("option");
      opt.value = d;
      opt.textContent = d;
      districtSelect.appendChild(opt);
    });
  } catch (err) {
    console.error(err);
    setStatus("⚠ Could not load districts — " + err.message, "error");
  }
}

districtSelect.addEventListener("change", async () => {
  const district = districtSelect.value;
  villageSelect.innerHTML = '<option value="">Select Village</option>';
  villageSelect.disabled = true;
  showAnalyticsBtn.disabled = true;

  if (!district) return;

  try {
    const data = await fetchJSON(`/villages?district=${encodeURIComponent(district)}`);
    data.villages.forEach((v) => {
      const opt = document.createElement("option");
      opt.value = v;
      opt.textContent = v;
      villageSelect.appendChild(opt);
    });
    villageSelect.disabled = false;

    const boundary = await fetchJSON(`/district_boundary?district=${encodeURIComponent(district)}`);
    drawBoundary(boundary, "#1a4d8f", false);
  } catch (err) {
    console.error(err);
    setStatus("⚠ " + err.message, "error");
  }
});

villageSelect.addEventListener("change", async () => {
  const village = villageSelect.value;
  showAnalyticsBtn.disabled = !village;
  if (!village) return;

  try {
    const boundary = await fetchJSON(`/village_boundary?village=${encodeURIComponent(village)}`);
    drawBoundary(boundary, "#e53935", true);
  } catch (err) {
    console.error(err);
    setStatus("⚠ " + err.message, "error");
  }
});

function drawBoundary(geojson, color, zoomTo) {
  if (boundaryLayer) {
    map.removeLayer(boundaryLayer);
  }
  boundaryLayer = L.geoJSON(geojson, {
    style: { color, weight: 2, fillOpacity: 0.05 },
  });

  if (document.getElementById("toggle-boundary").checked) {
    boundaryLayer.addTo(map);
  }

  if (zoomTo) {
    map.fitBounds(boundaryLayer.getBounds(), { maxZoom: 14 });
  }
}

/* ---------- Analytics panel ---------- */

const analyticsPanel = document.getElementById("analytics-panel");
const analyticsEmpty = document.getElementById("analytics-empty");
const analyticsContent = document.getElementById("analytics-content");
let lastStats = null;

showAnalyticsBtn.addEventListener("click", async () => {
  const village = villageSelect.value;
  if (!village) return;

  analyticsPanel.hidden = false;
  showAnalyticsBtn.disabled = true;
  showAnalyticsBtn.textContent = "Loading...";

  try {
    const stats = await fetchJSON(`/village_stats?village=${encodeURIComponent(village)}`);
    lastStats = stats;
    renderStats(stats);
  } catch (err) {
    console.error(err);
    setStatus("⚠ " + err.message, "error");
  } finally {
    showAnalyticsBtn.disabled = false;
    showAnalyticsBtn.textContent = "Show Analytics";
  }
});

function renderStats(stats) {
  analyticsEmpty.hidden = true;
  analyticsContent.hidden = false;

  document.getElementById("stat-village-name").textContent = stats.village;
  document.getElementById("stat-district-name").textContent = stats.district;
  document.getElementById("stat-cotton").textContent =
    `${stats.cotton_area_ha} ha (${stats.cotton_percent}%)`;
  document.getElementById("stat-paddy").textContent =
    `${stats.paddy_area_ha} ha (${stats.paddy_percent}%)`;
  document.getElementById("stat-other").textContent =
    `${stats.other_area_ha} ha (${stats.other_percent}%)`;
  document.getElementById("stat-total").textContent = `${stats.village_area_ha} ha`;

  drawPieChart("stat-chart", [
    { label: "Cotton", value: stats.cotton_percent, color: "#ffc107" },
    { label: "Paddy", value: stats.paddy_percent, color: "#2e8b57" },
    { label: "Other", value: stats.other_percent, color: "#9aa5b1" },
  ]);
}

function drawPieChart(canvasId, slices) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext("2d");
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r = Math.min(cx, cy) - 8;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const total = slices.reduce((s, sl) => s + sl.value, 0) || 1;
  let start = -Math.PI / 2;

  slices.forEach((sl) => {
    const angle = (sl.value / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, start + angle);
    ctx.closePath();
    ctx.fillStyle = sl.color;
    ctx.fill();
    start += angle;
  });
}

document.getElementById("export-stats-btn").addEventListener("click", async () => {
  const village = villageSelect.value;
  if (!village) return;
  try {
    const boundary = await fetchJSON(`/village_boundary?village=${encodeURIComponent(village)}`);
    const enriched = { ...boundary, properties_stats: lastStats };
    const blob = new Blob([JSON.stringify(enriched, null, 2)], { type: "application/geo+json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `${village.replace(/\s+/g, "_")}.geojson`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    console.error(err);
    setStatus("⚠ Export failed — " + err.message, "error");
  }
});

/* ---------- Pixel Inspector + mouse coordinates ---------- */

let pixelFetchTimer = null;

map.on("mousemove", (e) => {
  const { lat, lng } = e.latlng;
  document.getElementById("px-lat").textContent = lat.toFixed(6);
  document.getElementById("px-lon").textContent = lng.toFixed(6);

  clearTimeout(pixelFetchTimer);
  pixelFetchTimer = setTimeout(async () => {
    try {
      const data = await fetchJSON(`/pixel?lon=${lng}&lat=${lat}`);
      document.getElementById("px-val").textContent = data.pixel_value;
      document.getElementById("px-crop").textContent = data.crop;
    } catch {
      document.getElementById("px-val").textContent = "—";
      document.getElementById("px-crop").textContent = "Outside raster";
    }
  }, 120);
});

/* ---------- Init ---------- */

(async function init() {
  setStatus("Loading...", "");
  await Promise.all([loadRasterInfo(), loadDistricts()]);
})();

</script>
</body>
</html>
